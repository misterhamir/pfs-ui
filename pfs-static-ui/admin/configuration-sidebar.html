<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PebbleFlow IDP VHMI - Configuration Sidebar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-primary: #84cc16;
            --color-primary-hover: #65a30d;
            --color-primary-light: #f7fee7;
            --color-background: #ffffff;
            --color-surface: #f5f5f5;
            --color-text-primary: #374151;
            --color-text-secondary: #6b7280;
            --color-border: #e5e7eb;
            --color-success: #84cc16;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
            --font-sans: 'Inter', system-ui, sans-serif;
            --radius-DEFAULT: 8px;
        }

        @layer base {
            body {
                @apply bg-[#f9fafb] text-text-primary font-sans antialiased m-0 h-screen w-screen overflow-hidden flex;
            }
        }
    </style>
</head>

<body class="bg-[#f9fafb] text-text-primary font-sans antialiased m-0 h-screen w-screen overflow-hidden flex">
    <aside class="flex h-full w-[360px] flex-col border-r border-border bg-white">
        <div class="flex h-16 shrink-0 items-center justify-between border-b border-border px-4">
            <div class="flex items-center gap-3">
                <div class="flex h-9 w-9 items-center justify-center rounded bg-[#fff7ed] text-[#f97316]">👥</div>
                <div>
                    <div class="text-[11px] uppercase tracking-[0.24em] text-[#6b7280]">User Group Approval</div>
                    <div class="mt-1 text-[15px] font-semibold text-[#111827]">Technical Ledger</div>
                    <div class="text-[11px] uppercase tracking-[0.24em] text-[#9ca3af]">Forensic Node Editor</div>
                </div>
            </div>
            <button class="text-2xl text-[#9ca3af]">×</button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 py-6">
            <div class="space-y-6">
                <section class="space-y-3">
                    <div class="flex items-center gap-2 text-[13px] font-semibold uppercase tracking-[0.18em] text-[#111827]">
                        <span class="h-2 w-2 bg-[#a3a315]"></span>
                        Human Routing
                    </div>
                    <div class="grid grid-cols-2 rounded border border-border bg-white text-sm">
                        <button class="rounded-l bg-[#111827] px-3 py-2 text-white">Specific User</button>
                        <button class="rounded-r border-l border-border px-3 py-2 text-[#6b7280]">Blast to Group</button>
                    </div>
                    <div>
                        <div class="text-[10px] uppercase tracking-[0.24em] text-[#9ca3af]">Search Workspace User</div>
                        <div class="mt-2 flex items-center rounded border border-border bg-white px-3 py-3">
                            <div class="h-4 w-4 ml-auto text-[#9ca3af]">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="space-y-3">
                    <div class="flex items-center gap-2 text-[13px] font-semibold uppercase tracking-[0.18em] text-[#111827]">
                        <span class="h-2 w-2 bg-[#a3a315]"></span>
                        Documents To Compare
                    </div>
                    <div class="space-y-3">
                        <div class="rounded border border-[#d9e6a2] bg-[#fafdf0] p-3">
                            <div class="flex items-center justify-between">
                                <div>
                                    <div class="text-sm font-medium text-[#111827]">Invoice_v2</div>
                                    <div class="text-[10px] uppercase tracking-[0.18em] text-[#6b7280]">Schema ID: 882-AF</div>
                                </div>
                                <div class="text-[#9ca3af]">⊖</div>
                            </div>
                        </div>
                        <div class="rounded border border-border bg-white p-3">
                            <div class="flex items-center justify-between">
                                <div>
                                    <div class="text-sm font-medium text-[#111827]">Purchase_Order_v1</div>
                                    <div class="text-[10px] uppercase tracking-[0.18em] text-[#6b7280]">Schema ID: 441-ZX</div>
                                </div>
                                <div class="text-[#9ca3af]">⊖</div>
                            </div>
                        </div>
                        <div class="rounded border border-dashed border-[#d1d5db] bg-white px-4 py-4 text-center text-[#6b7280]">+ Add Schema</div>
                    </div>
                </section>

                <section class="space-y-3">
                    <div class="flex items-center gap-2 text-[13px] font-semibold uppercase tracking-[0.18em] text-[#111827]">
                        <span class="h-2 w-2 bg-[#a3a315]"></span>
                        Alignment Rules
                    </div>
                    <div class="space-y-3">
                        <div class="rounded border border-border bg-[#fafafa] p-3">
                            <div class="text-[10px] uppercase tracking-[0.24em] text-[#9ca3af]">Rule 01</div>
                            <div class="mt-3 flex items-center gap-2 text-sm">
                                <span class="rounded border-l-4 border-[#a3a315] bg-white px-3 py-2 text-[#111827]">Total Amount</span>
                                <span class="text-[#a3a315]">==</span>
                                <span class="rounded border-l-4 border-[#a3a315] bg-white px-3 py-2 text-[#111827]">PO Total</span>
                            </div>
                        </div>
                        <div class="rounded border border-border bg-[#fafafa] p-3">
                            <div class="text-[10px] uppercase tracking-[0.24em] text-[#9ca3af]">Rule 02</div>
                            <div class="mt-3 flex items-center gap-2 text-sm text-[#c4c4c4]">
                                <span class="rounded border-l-4 border-[#cbd5e1] bg-white px-3 py-2">Vendor_Name</span>
                                <span>=</span>
                                <span class="rounded border-l-4 border-[#cbd5e1] bg-white px-3 py-2">Supplier_ID</span>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <div class="border-t border-border p-4">
            <div class="flex items-center gap-3">
                <button class="w-full rounded bg-[#111827] px-4 py-3 text-sm font-medium text-white">Commit Config</button>
                <button class="h-[42px] w-[48px] rounded border border-border bg-white text-lg text-[#6b7280]">🗑</button>
            </div>
        </div>
    </aside>
</body>

</html>
